name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  push:
    branches: [main]
    paths:
      - 'package-lock.json'
      - 'packages/*/package.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=high
      - name: Create issue on failure
        if: failure() && steps.audit.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const title = `Security: npm audit found vulnerabilities (${new Date().toISOString().slice(0, 10)})`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security',
            });
            if (issues.some(i => i.title.startsWith('Security: npm audit'))) {
              console.log('Open security issue already exists, skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## npm audit found vulnerabilities',
                '',
                `The scheduled security audit workflow failed on ${new Date().toISOString().slice(0, 10)}.`,
                '',
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'Please run `npm audit` locally and resolve the reported issues.',
              ].join('\n'),
              labels: ['security'],
            });
