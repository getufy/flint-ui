name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression
    runs-on: ubuntu-latest
    steps:
      - name: Check for Chromatic token
        id: check-token
        run: |
          if [ -z "${{ secrets.CHROMATIC_PROJECT_TOKEN }}" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Chromatic skipped — CHROMATIC_PROJECT_TOKEN not set"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check-token.outputs.has_token == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        if: steps.check-token.outputs.has_token == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.check-token.outputs.has_token == 'true'
      - name: Build Storybook for Chromatic
        if: steps.check-token.outputs.has_token == 'true'
        run: npm run build-storybook
        env:
          CHROMATIC: true
      - name: Run Chromatic
        if: steps.check-token.outputs.has_token == 'true'
        uses: chromaui/action@0794e6939fe40ce46a88963f818092afc427da5b # v15.3.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/core/storybook-static
          # Non-blocking on PRs — visual diffs show as a check but don't fail the build
          exitZeroOnChanges: true
          exitOnceUploaded: true
          # Auto-accept changes on main so the baseline stays current
          autoAcceptChanges: main
          # Skip builds when only non-UI files change
          onlyChanged: true
