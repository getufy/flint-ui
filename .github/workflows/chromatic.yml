name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    name: Visual Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Storybook for Chromatic
        run: npm run build-storybook
        env:
          CHROMATIC: true
      - name: Run Chromatic
        uses: chromaui/action@5ec258af08deb3e8c36653bd618cb7fe52090031 # v15.2.0
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: packages/core/storybook-static
          # Non-blocking on PRs — visual diffs show as a check but don't fail the build
          exitZeroOnChanges: true
          exitOnceUploaded: true
          # Auto-accept changes on main so the baseline stays current
          autoAcceptChanges: main
          # Skip builds when only non-UI files change
          onlyChanged: true
