version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      lit:
        patterns:
          - "lit"
          - "lit-*"
          - "@lit/*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "@typescript-eslint/*"
      size-limit:
        patterns:
          - "size-limit"
          - "@size-limit/*"
      testing:
        patterns:
          - "jsdom"
          - "happy-dom"
          - "playwright*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns:
          - "*"
